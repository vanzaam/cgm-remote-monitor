# Nightscout Multi-Tenant NGINX Configuration
# HTTPS: 443 -> frps on 127.0.0.1:80
# Cert must cover all server_name (SAN or wildcard *.vanzaam.ru)

server {
    listen 443 ssl;
    http2 on;
    server_name
        vanzaam.ru
        www.vanzaam.ru
        ns1.vanzaam.ru
        ns2.vanzaam.ru
        ns3.vanzaam.ru
        ns4.vanzaam.ru
        ns5.vanzaam.ru
        ns6.vanzaam.ru
        ns7.vanzaam.ru
        ns8.vanzaam.ru
        ns9.vanzaam.ru
        ns10.vanzaam.ru;

    ssl_certificate     C:/Certbot/live/vanzaam.ru/fullchain.pem;
    ssl_certificate_key C:/Certbot/live/vanzaam.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # --- WebSocket: socket.io polling + upgrade ---
    location /socket.io/ {
        proxy_pass http://127.0.0.1:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }

    # --- Service Worker: must be served from / scope with correct headers ---
    location = /sw.js {
        proxy_pass http://127.0.0.1:80;
        proxy_http_version 1.1;
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Service Worker must never be cached by browser or CDN
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # --- Push API ---
    location /api/v1/push/ {
        proxy_pass http://127.0.0.1:80;
        proxy_http_version 1.1;
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Everything else ---
    location / {
        proxy_pass http://127.0.0.1:80;
        proxy_http_version 1.1;
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name
        vanzaam.ru
        www.vanzaam.ru
        ns1.vanzaam.ru
        ns2.vanzaam.ru
        ns3.vanzaam.ru
        ns4.vanzaam.ru
        ns5.vanzaam.ru
        ns6.vanzaam.ru
        ns7.vanzaam.ru
        ns8.vanzaam.ru
        ns9.vanzaam.ru
        ns10.vanzaam.ru;

    location / {
        return 301 https://$host$request_uri;
    }
}
