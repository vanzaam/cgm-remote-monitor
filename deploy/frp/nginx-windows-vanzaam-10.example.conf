# Пример для nginx на Windows (TLS на VPS, прокси на frps HTTP :80)
# Подставь пути к сертификатам win-acme и при необходимости upstream.
#
# DNS: A-записи ns1…ns10 и (если нужен) корень vanzaam.ru → IP VPS.
# Сертификат Let's Encrypt: либо один SAN на все имена ниже, либо wildcard *.vanzaam.ru (DNS-01).
#
# Цепочка: браузер https://ns3.vanzaam.ru → nginx:443 → http://127.0.0.1:80 (frps) → frpc → Mac:1337

server {
    listen 443 ssl;
    http2 on;
    server_name
        vanzaam.ru
        www.vanzaam.ru
        ns1.vanzaam.ru
        ns2.vanzaam.ru
        ns3.vanzaam.ru
        ns4.vanzaam.ru
        ns5.vanzaam.ru
        ns6.vanzaam.ru
        ns7.vanzaam.ru
        ns8.vanzaam.ru
        ns9.vanzaam.ru
        ns10.vanzaam.ru;

    # ssl_certificate     C:/path/to/vanzaam.ru/fullchain.pem;
    # ssl_certificate_key C:/path/to/vanzaam.ru/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}

